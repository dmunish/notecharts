[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "notecharts"
version = "0.1.0"
description = "Direct ECharts in Jupyter notebooks – just write JSON options, see beautiful charts."
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Danish Munib", email = "your.email@example.com"},
]
keywords = ["echarts", "jupyter", "visualization", "charts", "notebook"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Jupyter",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Visualization",
]
requires-python = ">=3.8"
dependencies = [
    "IPython"
]

[project.urls]
Homepage = "https://github.com/dmunish/notecharts"
Repository = "https://github.com/dmunish/notecharts.git"
Issues = "https://github.com/dmunish/notecharts/issues"

[tool.setuptools.packages.find]
include = ["notecharts*"]